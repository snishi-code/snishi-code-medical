name: tests

# push / PR のたびに hospital-rounds のテストを自動実行する。
# - 単体テスト (node test/check.mjs)
# - 実ブラウザ E2E (Playwright + chromium、headless)
# コミットに ✓ / ✗ が付き、テスト回し忘れでも壊れに気づける。

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hospital-rounds
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hospital-rounds/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: hospital-rounds/playwright-report/
          retention-days: 7
